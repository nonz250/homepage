# Phase 3 Batch D: security-headers ジョブ用の nginx 設定。
#
# 目的:
#   - CI (GitHub Actions の `security-headers` job) とローカル検証で、
#     `.output/public/` の静的成果物を nginx から配信し、
#     `Content-Security-Policy-Report-Only` などのヘッダが期待どおりに
#     付与されているかを `curl -I` + `scripts/assert-security-headers.sh`
#     で確認する。
#
# 上書き方針:
#   - `docker-compose.security-test.yml` で本 file を
#     `/etc/nginx/conf.d/default.conf` に bind mount し、既定の proxy 版を
#     上書きする。これにより同一イメージを本番 (proxy_pass) と CI 検証
#     (static root) の両方で使える。
server {
  listen 80;
  server_name localhost;

  include /etc/nginx/conf.d/_security-add.conf;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }
}
