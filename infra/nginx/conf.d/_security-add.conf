# Phase 3 Batch D: server context からセキュリティヘッダ群を付与する partial。
#
# 目的:
#   - 複数の server block (`default.conf` / `test.conf` 等) で同じセキュリティ
#     ヘッダ群を共有するため、add_header の集合をここに一本化する。
#   - CSP の値は `_security-map.conf` で定義した map 変数から参照する。
#
# 使い方:
#   server { include /etc/nginx/conf.d/_security-add.conf; ... }
#
# 注意:
#   - `add_header` は最も内側の block にひとつでも存在すると上位階層の
#     add_header を継承しない nginx の仕様がある。必要なら個別 location 内で
#     再度 include すること。
#   - `always` フラグを付けることで 4xx / 5xx レスポンスにもヘッダを付与する。
#
# Phase 4 への申し送り:
#   - CSP enforcing 昇格時は、末尾の `Content-Security-Policy-Report-Only` を
#     `Content-Security-Policy` に差し替える (1 行差し替え)。
#   - HSTS `preload` 付与は本番ドメインの所在確認後に別 PR で対応する。

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), interest-cohort=(), usb=(), bluetooth=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self), display-capture=()" always;
add_header X-Frame-Options "DENY" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Content-Security-Policy-Report-Only $csp_policy_report_only always;
# Phase 4 で enforcing 昇格時は下行に切替え:
# add_header Content-Security-Policy $csp_policy_enforce always;
