# Phase 3 Batch D: CSP ポリシーを http context の map に定義する。
#
# 目的:
#   - `Content-Security-Policy(-Report-Only)` の値を一箇所に集約し、
#     本番 / テスト / Report-Only / enforcing で共通利用できるようにする。
#   - `add_header` は server context の include (`_security-add.conf`) から
#     参照するが、値を構築する map ディレクティブは **server ブロックの外**
#     (http context) にしか書けないため、別ファイルに分離する。
#
# 読み込み順:
#   - `conf.d/*.conf` はファイル名のアルファベット順に include される。
#   - `_security-map.conf` (この file) が先に評価され、http context に map を
#     登録する。続けて `_security-add.conf` が server ブロック内から include
#     されることで、同じ変数名 (`$csp_policy_report_only` 等) を参照できる。
#
# Phase 4 への申し送り:
#   - enforcing 昇格時は `_security-add.conf` の `Content-Security-Policy-Report-Only`
#     行を `Content-Security-Policy` に差し替える (この file の map は両方とも
#     定義済みのため、header name のみ切り替えれば良い)。

# Google Analytics (GA4) 用の追加許可ドメイン群 (Issue #58):
#   - script-src   : gtag.js 本体のソース (www.googletagmanager.com)
#   - img-src      : `/collect` ピクセル / ビーコン送信先
#   - connect-src  : Measurement Protocol / region route / consent mode 経由の
#                    XHR / fetch 送信先
# enforcing / report-only 双方で同一にしておき、Phase 4 昇格時に計測が
# 壊れないようにする。

# CSP Report-Only 用ポリシー。2 週間の観測期間中はこちらを配信する。
map $host $csp_policy_report_only {
  default "default-src 'self'; script-src 'self' 'unsafe-inline' https://platform.twitter.com https://gist.github.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://gist.github.com; img-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://codepen.io https://codesandbox.io https://stackblitz.com https://platform.twitter.com; connect-src 'self' https://gist.github.com https://www.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://stats.g.doubleclick.net; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests;";
}

# CSP enforcing 用ポリシー。Phase 4 の切替えポイント。Report-Only と完全同一に
# しておき、違反レポートで問題がなければそのまま enforcing に昇格する。
map $host $csp_policy_enforce {
  default "default-src 'self'; script-src 'self' 'unsafe-inline' https://platform.twitter.com https://gist.github.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://gist.github.com; img-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://codepen.io https://codesandbox.io https://stackblitz.com https://platform.twitter.com; connect-src 'self' https://gist.github.com https://www.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://stats.g.doubleclick.net; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests;";
}
