name: Test

# Phase 1 Blog MVP の品質ゲート。
#
# ジョブ構成:
#   typecheck           - vue-tsc による型チェック (必須ゲート)
#   unit                - 純関数 / コンポーネント単体テスト
#   integration         - npm run generate を走らせて .output / .data を検証
#   contract            - CONTENT_PREVIEW などランタイム契約の固定
#   build-artifact-scan - generate 後の下書き / 外部画像リーク検査
#   e2e                 - Playwright による end-to-end テスト (Step 17 で追加)
#   security-headers    - Phase 3 Batch D: nginx 経由で CSP Report-Only など
#                          のセキュリティヘッダが返ることを検査
#
# fork PR 制御:
#   - fork の PR からは OGP 用ネットワーク fetch を一切行わないよう、
#     generate を呼ぶジョブでは `NO_NETWORK_FETCH` を条件付きで `'1'` に
#     昇格させる。通常 PR / main push では空文字 (fetch 実行)。
#
# TODO(phase 2): ESLint を導入し lint ジョブを追加する。

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Type check with vue-tsc
        run: npx vue-tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Run unit tests
        run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 (Nuxt Content native binding)
        run: npm rebuild better-sqlite3
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Run integration tests
        run: npm run test:integration

  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Run contract tests
        run: npm run test:contract

  build-artifact-scan:
    runs-on: ubuntu-latest
    # 生成成果物に対するスキャンなので、先に高速なテストを通してから回す。
    needs: [unit, integration]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 (Nuxt Content native binding)
        run: npm rebuild better-sqlite3
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Build (generate)
        run: npm run generate
      - name: Assert no drafts in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-drafts.sh
      - name: Assert no external images in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-external-images.sh

  e2e:
    runs-on: ubuntu-latest
    # ブラウザ起動が重いので、静的テストが通ってから回す。
    needs: [unit, integration, contract]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 (Nuxt Content native binding)
        run: npm rebuild better-sqlite3
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build (generate)
        run: npm run generate
      - name: Run E2E tests
        run: npm run test:e2e

  security-headers:
    # Phase 3 Batch D: `infra/nginx/` or `.github/workflows/test.yml` が
    # 変わったとき、および main push のときのみ走らせる。成果物が変わる度に
    # 必要なテストではないので、コスト削減のため paths 連動で絞る。
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(toJSON(github.event.pull_request.changed_files), 'infra/nginx/') ||
      contains(toJSON(github.event.pull_request.changed_files), '.github/workflows/test.yml')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 (Nuxt Content native binding)
        run: npm rebuild better-sqlite3
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare
      # CI ではネットワーク fetch を一切行わない。NO_NETWORK_FETCH=1 で
      # OGP 取得は failure fallback に倒れ、generate は継続する。
      - name: Build (generate, offline)
        env:
          NO_NETWORK_FETCH: '1'
        run: npm run generate
      - name: Start nginx (security-test)
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.security-test.yml up -d proxy
      - name: Assert security headers
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-security-headers.sh
      - name: Stop nginx
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.security-test.yml down
