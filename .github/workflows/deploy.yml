name: Deploy homepage (manual backup)

# v4 の標準経路では publish.yml の deploy job が main push を起点に deploy
# まで完走する。このワークフローは publish.yml パイプライン全体が deploy
# 前で停止した場合の **手動バックアップ** として残す。
#
# 通常経路 (main push) では起動しないよう workflow_dispatch 専用にする。
# 必要になったら GitHub UI の "Run workflow" から手動トリガーする。

on:
  workflow_dispatch:

permissions:
  contents: read

# 手動連打で deploy が二重起動すると rsync が同一ホストに重なり、
# 本番側のファイルが中途半端な state になる恐れがある。直列化のみ
# 行い、進行中の deploy は最後まで走らせる (cancel-in-progress: false)。
# publish.yml と同じ「副作用ありの job は cancel しない」方針。
concurrency:
  group: deploy-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # postinstall 起点の任意コード実行リスクを避けるため `--ignore-scripts`
      # を明示する。test.yml と同じ supply chain 対策を deploy にも適用。
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # Nuxt Content v3 は better-sqlite3 の native binding を必要とする。
      # `--ignore-scripts` で install 時の prebuild がスキップされるため、
      # この 1 パッケージだけを明示的に rebuild する。
      - name: Rebuild better-sqlite3 (Nuxt Content native binding)
        run: npm rebuild better-sqlite3

      # `nuxt prepare` は `.nuxt` 配下の型ファイルを生成する必須ステップ。
      # `--ignore-scripts` で postinstall を skip した分をここで明示実行する。
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare

      - name: Build (generate)
        run: npm run generate

      - name: Assert no drafts in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-drafts.sh

      - name: Assert no external images in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-external-images.sh

      - name: Deploy Directories
        run: ls -al

      - name: SSH key generate
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        run: rsync -ahvz --delete -e "ssh -i ~/.ssh/id_rsa -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no" ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:www/homepage --include-from="../.github/rsync_include.txt" --exclude-from="../.github/rsync_exclude.txt"
