name: Deploy homepage

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # postinstall 起点の任意コード実行リスクを避けるため `--ignore-scripts`
      # を明示する。test.yml と同じ supply chain 対策を deploy にも適用。
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # `nuxt prepare` は `.nuxt` 配下の型ファイルを生成する必須ステップ。
      # `--ignore-scripts` で postinstall を skip した分をここで明示実行する。
      - name: Nuxt prepare (generate .nuxt types)
        run: npm run prepare

      - name: Build (generate)
        run: npm run generate

      - name: Assert no drafts in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-drafts.sh

      - name: Assert no external images in build output
        working-directory: ${{ github.workspace }}
        run: bash scripts/assert-no-external-images.sh

      - name: Deploy Directories
        run: ls -al

      - name: SSH key generate
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        run: rsync -ahvz --delete -e "ssh -i ~/.ssh/id_rsa -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no" ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:www/homepage --include-from="../.github/rsync_include.txt" --exclude-from="../.github/rsync_exclude.txt"
